name: .NET CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore src/AssetTracking.sln

      - name: Build
        run: dotnet build src/AssetTracking.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/AssetTracking.sln --no-build --configuration Release --verbosity normal

      - name: Success
        if: success()
        run: echo "✓ Restore, ✓ Build, ✓ Test, ✓ Success"
