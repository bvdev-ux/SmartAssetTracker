services:
  postgres:
    image: postgres:16-alpine
    container_name: asset-tracking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: assettracking
      POSTGRES_PASSWORD: assettracking_dev
      POSTGRES_DB: assettracking
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assettracking -d assettracking"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
